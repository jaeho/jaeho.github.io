    <style>/* Tailwind CDN은 HTML에서 호출하므로 여기에는 커스텀 클래스만 넣습니다. */
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Gaegu:wght@400;700&display=swap');

:root {
    --primary-color: #2ECC71;
    --background-light: #F9FCF9;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --accent-blue: #EBF5FF;
    --accent-yellow: #FFFBEB;
    --paper-bg: #ffffff;
}

body {
    margin: 0;
    padding: 0;
    background-color: var(--background-light);
    display: flex;
    justify-content: center;
    font-family: 'Nanum Gothic', sans-serif;
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent;
}

/* 실제 인쇄 및 캡처 시 A4 규격 유지 */
@media print {
    body { background: none; padding: 0; }
    .no-print { display: none; }
    .paper {
        box-shadow: none !important;
        margin: 0 !important;
        width: 210mm;
        height: 297mm;
    }
}

.paper {
    width: 210mm;
    height: 297mm;
    background-color: var(--paper-bg);
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    padding: 15mm;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* 드롭캡: 씨앗 어린이 신문 스타일 */
.drop-cap::first-letter {
    float: left;
    font-size: 4.5rem;
    line-height: 0.8;
    font-weight: 800;
    padding-right: 12px;
    padding-top: 8px;
    color: var(--primary-color);
}

/* 기사 본문 최적화 */
.article-text {
    font-size: 19px;
    font-weight: 700;
    line-height: 1.65;
    text-align: justify;
    word-break: keep-all;
    color: var(--text-main);
    height: 100%;
    column-fill: auto;
}

.article-text p {
    display: block;
    margin-bottom: 0.75rem;
}

.text-hand {
    font-family: 'Gaegu', cursive;
}

/* 아이콘 스타일 */
.material-symbols-rounded {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
}

/* 카드 공통 스타일 */
.card-blue {
    background-color: var(--accent-blue);
    border: 1px solid #dbeafe;
    border-radius: 24px;
    padding: 14px;
}

.card-yellow {
    background-color: var(--accent-yellow);
    border: 2px dashed #fde68a;
    border-radius: 24px;
    padding: 14px;
}

/* 헤더 스타일링 */
.header-eco-icon {
    width: 40px;
    height: 40px;
    background-color: var(--primary-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    box-shadow: 0 4px 12px rgba(46, 204, 113, 0.2);
}

/* 4컷 만화 스타일 */
.cartoon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    height: 100%;
}

.cartoon-panel {
    border: 3px solid #1e293b;
    border-radius: 12px;
    position: relative;
    background-color: white;
    overflow: hidden;
    aspect-ratio: 1/1;
}

.cartoon-number {
    position: absolute;
    top: 8px;
    left: 8px;
    width: 24px;
    height: 24px;
    background-color: #1e293b;
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    z-index: 10;
}

.cartoon-dialogue {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background-color: rgba(255, 255, 255, 0.9);
    padding: 8px;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    border-top: 2px solid #1e293b;
}</style>

<body class="bg-white flex justify-center antialiased">

        <main class="flex-1 overflow-hidden">
            <div class="flex flex-col gap-6">
    <div class="bg-green-50 p-6 rounded-2xl border border-green-100 shadow-sm text-center">
        <p class="text-xl font-bold text-gray-800">선 없이 소리가 들리는 신기한 블루투스 세상을 예쁘게 색칠해 보세요!</p>

        <footer class="mt-auto">
            <div class="card-blue">
                <div class="flex items-center gap-2 mb-2 text-blue-600">
                    <span class="material-symbols-rounded text-sm">lightbulb</span>

                </div>
                <div class="flex flex-col gap-1">
                    <p class="text-3xl font-black text-slate-900">이심전심 (以心傳心)</p>
                    <p class="text-base font-bold text-blue-700/80 leading-snug">마음과 마음이 서로 통한다는 뜻이에요. 블루투스가 선 없이도 정보를 척척 주고받는 것처럼, 말하지 않아도 서로의 생각을 잘 이해하는 것을 말한답니다.</p>

        <footer class="text-center pt-2 relative">
            <button onclick="openArchiveModal()" class="text-[9px] text-slate-400 font-bold uppercase tracking-widest hover:text-primary transition-colors cursor-pointer bg-transparent border-none appearance-none p-0 m-0 w-full text-center">

            </button>
        </footer>

    <!-- 아카이브 모달 (추가) -->
    <div id="archiveModal" class="fixed inset-0 bg-black/40 hidden flex-col items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[24px] p-6 w-full max-w-sm shadow-2xl relative flex flex-col max-h-[80vh]">
            <button onclick="closeArchiveModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700">
                <span class="material-symbols-rounded">close</span>
            </button>
            <h3 class="text-xl font-extrabold text-slate-900 mb-4 flex items-center gap-2">
                <span class="material-symbols-rounded text-primary">auto_stories</span>
                다른 날짜 신문 보기
            </h3>
            <div id="archiveList" class="flex-1 overflow-y-auto flex flex-col gap-2 pr-2">
                <!-- JS가 여기에 목록을 채울 것입니다 -->
            </div>
        </div>
    </div>

    <script>
        function openArchiveModal() {
            const modal = document.getElementById('archiveModal');
            const list = document.getElementById('archiveList');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            if (list.children.length === 0) {
                if (window.ARCHIVE_DATES && window.ARCHIVE_DATES.length > 0) {
                    window.ARCHIVE_DATES.forEach(date => {
                        const btn = document.createElement('button');
                        btn.className = "w-full text-left px-4 py-3 rounded-xl bg-slate-50 hover:bg-primary/10 hover:text-primary font-bold text-slate-700 transition-colors border border-slate-100 flex items-center justify-between";
                        
                        const isCurrent = window.location.pathname.includes(date);
                        
                        let html = `<span>${date}</span>`;
                        if (isCurrent) {
                            html += `<span class="text-[10px] bg-primary text-white px-2 py-0.5 rounded-full z-10">현재</span>`;
                            btn.className += " border-primary/30 text-primary bg-primary/5";
                        } else {
                            html += `<span class="material-symbols-rounded text-sm opacity-50">arrow_forward</span>`;
                        }
                        
                        btn.innerHTML = html;
                        btn.onclick = () => {
                            window.location.href = `../${date}/index.html`;
                        };
                        list.appendChild(btn);
                    });
                } else {
                    list.innerHTML = '<p class="text-center text-slate-500 py-4 font-medium text-sm">목록을 불러올 수 없습니다.</p>';
                }
            }
        }

        function closeArchiveModal() {
            const modal = document.getElementById('archiveModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        document.getElementById('archiveModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeArchiveModal();
            }
        });
    </script>
