<!DOCTYPE html>

    <title>하루 한 장 어린이 신문 - 이동 중...</title>
    <script>
        (function() {
            var d = new Date();
            var year = d.getFullYear();
            var month = ('0' + (d.getMonth() + 1)).slice(-2);
            var day = ('0' + d.getDate()).slice(-2);
            var today = year + '-' + month + '-' + day;
            window.location.href = today + '/page1.html';
        })();
    </script>
</head>

    <script>
